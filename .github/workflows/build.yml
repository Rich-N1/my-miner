name: Build-Windows-Zero-Fee-Static

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      actions: write
    steps:
      - name: Checkout XMRig
        uses: actions/checkout@v4
        with:
          repository: xmrig/xmrig
          fetch-depth: 1

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-make curl jq

      - name: Get Info and Rename
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Извлекаем версию (Метод с четким индексом группы)
          $content = Get-Content "CMakeLists.txt" -Raw
          if ($content -match 'set\(VERSION "([^"]+)"\)') {
              $X_VER = $Matches[1]
          } else {
              $X_VER = "6.22.2"
          }
          
          # 2. Запрос даты релиза
          $REL_URL = "https://api.github.com"
          $REL_DATA = curl.exe -s -L $REL_URL | ConvertFrom-Json
          $PUB_DATE = $REL_DATA.published_at
          
          if ($PUB_DATE) {
              $FORM_DATE = [DateTime]::Parse($PUB_DATE).ToString("dd.MM.yyyy")
          } else {
              $FORM_DATE = (Get-Date).ToString("dd.MM.yyyy")
          }
          
          $FULL_NAME = "XMRig $X_VER ($FORM_DATE) no donate"
          
          # 3. Передача переменных (Важно для Upload)
          Add-Content -Path $env:GITHUB_ENV -Value "FINAL_NAME=$FULL_NAME"
          
          # 4. Обновление заголовка в списке Actions (Display Title)
          $body = @{ display_title = $FULL_NAME } | ConvertTo-Json -Compress
          curl.exe -L -X PATCH `
            -H "Accept: application/vnd.github+json" `
            -H "Authorization: Bearer $env:GH_TOKEN" `
            "https://api.github.com" `
            -d $body

      - name: Patch and Build
        shell: msys2 {0}
        run: |
          sed -i 's/kDefaultDonateLevel = 1/kDefaultDonateLevel = 0/g' src/donate.h
          sed -i 's/kMinimumDonateLevel = 1/kMinimumDonateLevel = 0/g' src/donate.h
          
          mkdir -p build && cd build
          export PATH="/mingw64/bin:$PATH"
          cmake .. -G "MinGW Makefiles" -DXMRIG_DEPS=OFF -DWITH_HWLOC=OFF -DWITH_OPENSSL=OFF -DWITH_HTTP=OFF -DWITH_ADL=OFF -DWITH_NVML=OFF -DCMAKE_EXE_LINKER_FLAGS="-static"
          mingw32-make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_NAME }}
          path: build/xmrig.exe
