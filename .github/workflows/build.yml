name: Build-Windows-Zero-Fee
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libuv
            mingw-w64-x86_64-hwloc
            git

      - name: Clone and Patch
        shell: msys2 {0}
        run: |
          A="https://github.com"
          B="/xmrig/xmrig"
          git clone --depth 1 $A$B
          cd xmrig
          sed -i 's/kDefaultDonateLevel = 1/kDefaultDonateLevel = 0/g' src/donate.h
          sed -i 's/kMinimumDonateLevel = 1/kMinimumDonateLevel = 0/g' src/donate.h

      - name: Build
        shell: msys2 {0}
        run: |
          cd xmrig
          mkdir build && cd build
          export PATH="/mingw64/bin:$PATH"
          cmake .. -G "MinGW Makefiles" -DXMRIG_DEPS=OFF -DWITH_ADL=OFF -DWITH_NVML=OFF
          mingw32-make -j$(nproc)
          # Копируем все нужные библиотеки в папку с программой
          cp /mingw64/bin/libwinpthread-1.dll .
          cp /mingw64/bin/libuv-1.dll .
          cp /mingw64/bin/libssl-*.dll .
          cp /mingw64/bin/libcrypto-*.dll .
          cp /mingw64/bin/libstdc++-6.dll .
          cp /mingw64/bin/libgcc_s_seh-1.dll .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-windows-zero-fee
          path: |
            xmrig/build/*.exe
            xmrig/build/*.dll
