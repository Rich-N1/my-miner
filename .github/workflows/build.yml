name: Build-Windows-Zero-Fee-Static
run-name: "XMRig Static Build (No Donate)"

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      actions: write
    steps:
      - name: Checkout XMRig
        uses: actions/checkout@v4
        with:
          repository: xmrig/xmrig
          fetch-depth: 1

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-make

      - name: Patch and Build
        shell: msys2 {0}
        run: |
          # 1. Обнуляем комиссию
          sed -i 's/kDefaultDonateLevel = 1/kDefaultDonateLevel = 0/g' src/donate.h
          sed -i 's/kMinimumDonateLevel = 1/kMinimumDonateLevel = 0/g' src/donate.h
          
          # 2. Сборка в один файл
          mkdir -p build && cd build
          export PATH="/mingw64/bin:$PATH"
          cmake .. -G "MinGW Makefiles" -DXMRIG_DEPS=OFF -DWITH_HWLOC=OFF -DWITH_OPENSSL=OFF -DWITH_HTTP=OFF -DWITH_ADL=OFF -DWITH_NVML=OFF -DCMAKE_EXE_LINKER_FLAGS="-static"
          mingw32-make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          # Название папки/архива будет всегда четким и понятным
          name: XMRig-Windows-Static-NoDonate
          path: build/xmrig.exe
