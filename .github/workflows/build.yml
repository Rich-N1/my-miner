name: Build-Windows-Zero-Fee
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone and Patch
        run: |
          git clone https://github.com
          cd xmrig
          (Get-Content src/donate.h) -replace 'kDefaultDonateLevel = 1', 'kDefaultDonateLevel = 0' -replace 'kMinimumDonateLevel = 1', 'kMinimumDonateLevel = 0' | Set-Content src/donate.h
      - name: Build
        run: |
          cd xmrig
          mkdir build; cd build
          cmake .. -DXMRIG_DEPS=scripts/deps.sh -DENABLE_STATIC=ON
          cmake --build . --config Release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-zero-fee
          path: xmrig/build/Release/xmrig.exe
