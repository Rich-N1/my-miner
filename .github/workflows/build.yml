name: Build-XMRig-Zero-Fee
run-name: "Сборка XMRig..."

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      actions: write
    steps:
      - name: Get Release Info
        id: info
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Получаем данные о релизе через PowerShell (надёжнее для Windows)
          $uri = "https://api.github.com"
          $rel = Invoke-RestMethod -Uri $uri
          
          $TAG = $rel.tag_name
          $RAW_DATE = $rel.published_at # Формат: 2024-05-15T...
          $FORM_DATE = [DateTime]::Parse($RAW_DATE).ToString("dd.MM.yyyy")
          
          $FULL_NAME = "XMRig $TAG ($FORM_DATE) no donate"
          
          # Сохраняем переменные
          echo "TAG=$TAG" >> $env:GITHUB_ENV
          echo "FINAL_NAME=$FULL_NAME" >> $env:GITHUB_ENV
          
          # 2. Обновляем название запуска в списке Actions
          $body = @{ display_title = $FULL_NAME } | ConvertTo-Json -Compress
          curl.exe -L -X PATCH `
            -H "Accept: application/vnd.github+json" `
            -H "Authorization: Bearer $($env:GH_TOKEN)" `
            "https://api.github.com" `
            -d $body

      - name: Checkout XMRig
        uses: actions/checkout@v4
        with:
          repository: xmrig/xmrig
          ref: ${{ env.TAG }}
          fetch-depth: 1

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-make

      - name: Patch and Build
        shell: msys2 {0}
        run: |
          sed -i 's/kDefaultDonateLevel = 1/kDefaultDonateLevel = 0/g' src/donate.h
          sed -i 's/kMinimumDonateLevel = 1/kMinimumDonateLevel = 0/g' src/donate.h
          
          mkdir -p build && cd build
          export PATH="/mingw64/bin:$PATH"
          cmake .. -G "MinGW Makefiles" -DXMRIG_DEPS=OFF -DWITH_HWLOC=OFF -DWITH_OPENSSL=OFF -DWITH_HTTP=OFF -DWITH_ADL=OFF -DWITH_NVML=OFF -DCMAKE_EXE_LINKER_FLAGS="-static"
          mingw32-make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_NAME }}
          path: build/xmrig.exe
