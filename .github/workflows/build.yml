name: Build-Windows-Zero-Fee
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            git

      - name: Clone and Patch
        shell: msys2 {0}
        run: |
          A="https://github.com"
          B="/xmrig/xmrig"
          git clone --depth 1 $A$B
          cd xmrig
          sed -i 's/kDefaultDonateLevel = 1/kDefaultDonateLevel = 0/g' src/donate.h
          sed -i 's/kMinimumDonateLevel = 1/kMinimumDonateLevel = 0/g' src/donate.h

      - name: Build
        shell: msys2 {0}
        run: |
          cd xmrig
          mkdir build && cd build
          export PATH="/mingw64/bin:$PATH"
          # Используем базовые настройки, отключая только видеокарты
          cmake .. -G "MinGW Makefiles" \
                   -DWITH_ADL=OFF \
                   -DWITH_NVML=OFF \
                   -DWITH_OPENSSL=OFF \
                   -DWITH_HTTP=OFF \
                   -DBUILD_STATIC=OFF
          mingw32-make -j$(nproc)
          # Копируем всё, что нужно для запуска
          cp /mingw64/bin/*.dll . || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-windows-zero-fee
          path: |
            xmrig/build/xmrig.exe
            xmrig/build/*.dll
