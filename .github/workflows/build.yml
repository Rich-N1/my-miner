name: Build-Windows-Zero-Fee-Static
# Эта строка задает имя запуска в списке Actions
run-name: "XMRig Build: ${{ github.run_id }}"

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout XMRig
        uses: actions/checkout@v4
        with:
          repository: xmrig/xmrig
          path: xmrig
          fetch-depth: 1

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            curl
            jq

      - name: Get Version and Date
        id: info
        shell: msys2 {0}
        run: |
          cd xmrig
          # Извлекаем версию
          X_VER=$(grep "set(VERSION" CMakeLists.txt | cut -d '"' -f 2)
          echo "XMRIG_VER=$X_VER" >> $GITHUB_ENV
          
          # Запрашиваем дату релиза через API
          REL_DATA=$(curl -s https://api.github.com)
          PUB_DATE=$(echo $REL_DATA | jq -r '.published_at' | cut -d'T' -f1)
          
          if [ "$PUB_DATE" != "null" ] && [ -n "$PUB_DATE" ]; then
            FORM_DATE=$(date -d "$PUB_DATE" +"%d.%m.%Y")
          else
            FORM_DATE=$(date +"%d.%m.%Y")
          fi
          echo "RELEASE_DATE=$FORM_DATE" >> $GITHUB_ENV
          
          # Эта магическая команда меняет имя текущего запуска в реальном времени!
          echo "::notice title=Build Info::XMRig $X_VER ($FORM_DATE) no donate"

      - name: Patch Donation
        shell: msys2 {0}
        run: |
          cd xmrig
          sed -i 's/kDefaultDonateLevel = 1/kDefaultDonateLevel = 0/g' src/donate.h
          sed -i 's/kMinimumDonateLevel = 1/kMinimumDonateLevel = 0/g' src/donate.h

      - name: Build Static EXE
        shell: msys2 {0}
        run: |
          cd xmrig
          mkdir build && cd build
          export PATH="/mingw64/bin:$PATH"
          cmake .. -G "MinGW Makefiles" -DXMRIG_DEPS=OFF -DWITH_HWLOC=OFF -DWITH_OPENSSL=OFF -DWITH_HTTP=OFF -DWITH_ADL=OFF -DWITH_NVML=OFF -DCMAKE_EXE_LINKER_FLAGS="-static"
          mingw32-make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # Имя архива совпадет с тем, что мы вычислили
          name: XMRig ${{ env.XMRIG_VER }} (${{ env.RELEASE_DATE }}) no donate
          path: xmrig/build/xmrig.exe
