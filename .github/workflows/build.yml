name: Build-Windows-Zero-Fee
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libuv
            mingw-w64-x86_64-hwloc
            git

      - name: Clone and Patch
        shell: msys2 {0}
        run: |
          # Исправленная ссылка:
          git clone --depth 1 https://github.com
          cd xmrig
          sed -i 's/kDefaultDonateLevel = [0-9]/kDefaultDonateLevel = 0/g' src/donate.h
          sed -i 's/kMinimumDonateLevel = [0-9]/kMinimumDonateLevel = 0/g' src/donate.h

      - name: Build
        shell: msys2 {0}
        run: |
          cd xmrig
          mkdir build && cd build
          cmake .. -G "Unix Makefiles" -DXMRIG_DEPS=OFF -DWITH_ADL=OFF -DWITH_NVML=OFF
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-windows-zero-fee
          path: xmrig/build/xmrig.exe
