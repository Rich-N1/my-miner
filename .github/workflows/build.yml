name: Build-Windows-Zero-Fee-Static
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            git

      - name: Clone and Patch
        shell: msys2 {0}
        run: |
          A="https://github.com"
          B="/xmrig/xmrig"
          git clone --depth 1 $A$B
          cd xmrig
          sed -i 's/kDefaultDonateLevel = 1/kDefaultDonateLevel = 0/g' src/donate.h
          sed -i 's/kMinimumDonateLevel = 1/kMinimumDonateLevel = 0/g' src/donate.h

      - name: Build Static
        shell: msys2 {0}
        run: |
          cd xmrig
          mkdir build && cd build
          export PATH="/mingw64/bin:$PATH"
          # Ключевой флаг: -DCMAKE_EXE_LINKER_FLAGS="-static"
          cmake .. -G "MinGW Makefiles" \
                   -DXMRIG_DEPS=OFF \
                   -DWITH_HWLOC=OFF \
                   -DWITH_OPENSSL=OFF \
                   -DWITH_HTTP=OFF \
                   -DWITH_ADL=OFF \
                   -DWITH_NVML=OFF \
                   -DCMAKE_EXE_LINKER_FLAGS="-static"
          mingw32-make -j$(nproc)

      - name: Upload Single EXE
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-single-file
          path: xmrig/build/xmrig.exe
